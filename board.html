<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>OrganizaAí</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- Sidebar, mais uma -->
  <aside class="sidebar" id="sidebar">

    <div class="toggle" onclick="toggleSidebar()">☰</div>

    <div class="menu">
      <p style="color:white; font-size:12px;">MENU</p>
      <button onclick="voltarHome()">Home</button>
    </div>

  </aside>

  <div class="main">

    <!-- Topo dinamico -->
    <header class="topbar" id="titulo">
      OrganizaAí
    </header>

    <!-- Board -->
    <div class="board">

      <div class="column">
        <h2>A Fazer</h2>
        <div class="tasks" id="afazer"></div>
        <button onclick="addTask('afazer')">+ Adicionar</button>
      </div>

      <div class="column">
        <h2>Fazendo</h2>
        <div class="tasks" id="fazendo"></div>
        <button onclick="addTask('fazendo')">+ Adicionar</button>
      </div>

      <div class="column">
        <h2>Concluído</h2>
        <div class="tasks" id="feito"></div>
        <button onclick="addTask('feito')">+ Adicionar</button>
      </div>

    </div>

  </div>

</div>

<script>
/*Sidebar novamente*/
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
}

/*Voltando pra home */
function voltarHome() {
  window.location.href = "index.html";
}

/* Pra cada pagina mudar o titulo de acordo com a materia */
document.addEventListener("DOMContentLoaded", () => {
  const materia = localStorage.getItem("materia") || "Geral";
  const titulo = document.getElementById("titulo");
  
  if (titulo) {
    titulo.innerText = "OrganizaAí • " + materia;
  }
});
</script>

<script src="script.js"></script>

</body>
</html>
