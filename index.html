<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>OrganizaAí</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">

    <div class="toggle" onclick="toggleSidebar()">☰</div>

    <div class="menu">
      <p style="color:white; font-size:12px;">MATÉRIAS</p>
      <button onclick="addMateria()">+ Nova Matéria</button>
    </div>

  </aside>

  <!-- Conteudo principal -->
  <div class="main">

    <!-- Topo -->
    <header class="topbar">
      OrganizaAí • Minhas Matérias
    </header>

    <!--Card-->
    <div class="home"></div>

  </div>

</div>

<script>
/* Sidebar, usei muita sidebar nesse projeto, aprendi e usei */
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
}

/* Fazendo local storage */
function getMaterias() {
  try {
    return JSON.parse(localStorage.getItem("materias")) || [
      "VEXT", "FDIA", "FSO", "ESD", "FGSI"
    ];
  } catch {
    return ["VEXT", "FDIA", "FSO", "ESD", "FGSI"];
  }
}

function saveMaterias(lista) {
  localStorage.setItem("materias", JSON.stringify(lista));
}

/* Render dos cards*/
function renderMaterias() {
  const container = document.querySelector(".home");
  container.innerHTML = "";

  const materias = getMaterias();

  materias.forEach(m => {
    const div = document.createElement("div");
    div.className = "card";

    // Contando quantas tarefas
    const data = JSON.parse(localStorage.getItem("kanban_" + m)) || {};
    const total =
  (data.todo?.match(/class="task"/g) || []).length +
  (data.doing?.match(/class="task"/g) || []).length +
  (data.done?.match(/class="task"/g) || []).length;

    div.innerText = `${m} (${total})`;
    div.onclick = () => openBoard(m);

    container.appendChild(div);
  });
}

/* Parte para conseguir adicionar uma materia */
function addMateria() {
  const nome = prompt("Nome da nova matéria:");
  if (!nome || nome.trim() === "") return; /*vejo muito conteudo sem trim nos bancos no trabalho,pensei em fazer algo, mas nao sei se fiz certo*/

  const nomeFormatado = nome.trim().toUpperCase();
  const materias = getMaterias();

  /*Evitando duplicadas*/
  if (materias.includes(nomeFormatado)) {
    alert("Essa matéria já existe!");
    return;
  }

  materias.push(nomeFormatado);
  saveMaterias(materias);
  renderMaterias();
}

/* Parte de navegacao */
function openBoard(materia) {
  localStorage.setItem("materia", materia);
  window.location.href = "board.html";
}

/*Listener */
document.addEventListener("DOMContentLoaded", () => {
  renderMaterias();
});
</script>

</body>
</html>
